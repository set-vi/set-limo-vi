<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Superb Executive Transportation | Request a Reservation</title>
  <meta name="description" content="Superb Executive Transportation — private airport, resort, villa, business, and corporate transportation in St. Thomas, U.S. Virgin Islands." />

  <link rel="canonical" href="https://set-vi.github.io/set-limo-vi/flyer/" />
  <meta property="og:title" content="Superb Executive Transportation" />
  <meta property="og:description" content="Click or scan to request private executive transportation." />
  <meta property="og:image" content="https://set-vi.github.io/set-limo-vi/flyer/assets/superb-flyer.png" />
  <meta property="og:url" content="https://set-vi.github.io/set-limo-vi/flyer/" />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --bg: #050505;
      --gold: #b08a45;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px;
    }

    .flyer-shell {
      width: min(100%, 720px);
      margin: 0 auto;
    }

    .flyer {
      position: relative;
      width: 100%;
      line-height: 0;
      background: #000;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.65);
    }

    .flyer img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      border-radius: 8px;
      text-indent: -9999px;
      overflow: hidden;
      outline: none;
      z-index: 2;
    }

    .hotspot:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 3px;
      background: rgba(176, 138, 69, 0.14);
    }

    .full-flyer-link {
      inset: 0;
      z-index: 1;
      border-radius: 0;
    }

    .qr {
      left: 36.328125%;
      top: 77.473958%;
      width: 28.906250%;
      height: 18.880208%;
    }

    .phone {
      left: 3.417969%;
      top: 95.703125%;
      width: 27.343750%;
      height: 4.296875%;
    }

    .email {
      left: 31.738281%;
      top: 95.703125%;
      width: 32.714844%;
      height: 4.296875%;
    }

    .site {
      left: 65.429688%;
      top: 95.703125%;
      width: 34.570312%;
      height: 4.296875%;
    }
  </style>
</head>

<body>
  <main class="flyer-shell" aria-label="Superb Executive Transportation digital flyer">
    <section class="flyer">
      <img src="assets/superb-flyer.png" alt="Superb Executive Transportation flyer. Click anywhere or scan the QR code to request a reservation." />

      <a class="hotspot full-flyer-link" href="https://set-vi.github.io/set-limo-vi/booking.html" aria-label="Open the Superb Executive Transportation reservation request website"></a>
      <a class="hotspot qr" href="https://set-vi.github.io/set-limo-vi/booking.html" aria-label="Open the reservation request website from the QR code area"></a>
      <a class="hotspot phone" href="tel:+13406428686" aria-label="Call Superb Executive Transportation at 340-642-8686"></a>
      <a class="hotspot email" href="mailto:setlimovi@gmail.com" aria-label="Email Superb Executive Transportation"></a>
      <a class="hotspot site" href="https://set-vi.github.io/set-limo-vi/booking.html" aria-label="Open the Superb Executive Transportation reservation request website"></a>
    </section>
  </main>
</body>
</html>
