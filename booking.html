<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevate Your Journey | Superb Executive Transportation</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
      width: 100%;
      max-width: 500px;
    }

    .hero-image {
      position: relative;
      width: 100%;
      max-height: 280px;
      overflow: hidden;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .hero-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }

    .hero-heading {
      text-align: center;
      font-size: 1.6em;
      font-weight: bold;
      color: #fff;
      margin-top: -10px;
      margin-bottom: 25px;
      text-shadow: 0 0 3px #d4af37, 0 0 6px #d4af37;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      font-size: 1em;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #222;
      color: #fff;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #d4af37;
      outline: none;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #000;
      color: #fff;
      font-weight: bold;
      border: 2px solid #d4af37;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background-color: #d4af37;
      color: #000;
    }

    button:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .contact-info {
      margin-top: 30px;
      text-align: center;
      font-size: 0.95em;
      color: #ccc;
    }

    .contact-info a {
      color: #d4af37;
      text-decoration: none;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    .hidden-section {
      display: none;
    }

    .helper-note {
      font-size: 0.8em;
      color: #d4af37;
      margin-top: 6px;
      display: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 20px;
      }

      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

        <option value="Charlotte Amalie">Charlotte Amalie</option>

        <option value="Charlotte Amalie">Charlotte Amalie</option>
        <option value="Cyril E. King Airport">Cyril E. King Airport</option>
        <option value="Emerald Beach Resort">Emerald Beach Resort</option>
        <option value="Havensight">Havensight</option>
        <option value="Magens Bay">Magens Bay</option>
        <option value="Marriott Frenchman's Reef">Marriott Frenchman's Reef</option>
        <option value="Margaritaville Vacation Club">Margaritaville Vacation Club</option>
        <option value="Point Pleasant Resort">Point Pleasant Resort</option>
        <option value="Red Hook Ferry Terminal">Red Hook Ferry Terminal</option>
        <option value="Secret Harbour Beach Resort">Secret Harbour Beach Resort</option>
        <option value="St. John">St. John</option>
        <option value="The Ritz-Carlton, St. Thomas">The Ritz-Carlton, St. Thomas</option>
        <option value="Tutu Park Mall">Tutu Park Mall</option>
        <option value="Yacht Haven Grande">Yacht Haven Grande</option>

      <label for="passengers"># of Passengers</label>

        Groups over 6 passengers may require a second vehicle. Weâ€™ll follow up to
        confirm arrangements.

      <label for="roundtrip">Round Trip?</label>

      <div id="return-fields" class="hidden-section">
        <label for="return-date">Return Date</label>
        <input type="date" id="return-date" name="return-date" />

        <label for="return-time">Return Time</label>
        <select id="return-time" name="return-time">
          <option value="">-- Select Time --</option>
          <option value="05:00">5:00 AM</option>
          <option value="06:00">6:00 AM</option>
          <option value="07:00">7:00 AM</option>
          <option value="08:00">8:00 AM</option>
          <option value="09:00">9:00 AM</option>
          <option value="10:00">10:00 AM</option>
          <option value="11:00">11:00 AM</option>
          <option value="12:00">12:00 PM</option>
          <option value="13:00">1:00 PM</option>
          <option value="14:00">2:00 PM</option>
          <option value="15:00">3:00 PM</option>
          <option value="16:00">4:00 PM</option>
          <option value="17:00">5:00 PM</option>
          <option value="18:00">6:00 PM</option>
          <option value="19:00">7:00 PM</option>
          <option value="20:00">8:00 PM</option>
          <option value="21:00">9:00 PM</option>

      <p>

          https://set-vi.github.io/set-limo-vi/
        </a>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('booking-form');
      const submitBtn = document.getElementById('submit-btn');
      const phoneInput = document.getElementById('phone');
      const emailInput = document.getElementById('email');
      const confirmEmailInput = document.getElementById('confirm-email');
      const dateInput = document.getElementById('date');
      const serviceTime = document.getElementById('time');
      const pickupInput = document.getElementById('pickup');
      const airportExtra = document.getElementById('airport-extra');
      const roundTripSelect = document.getElementById('roundtrip');
      const returnFields = document.getElementById('return-fields');
      const returnDateInput = document.getElementById('return-date');
      const returnTime = document.getElementById('return-time');
      const passengerInput = document.getElementById('passengers');
      const passengerWarning = document.getElementById('passenger-warning');

      function getTodayLocalISO() {
        const now = new Date();
        const offset = now.getTimezoneOffset();
        const local = new Date(now.getTime() - offset * 60000);
        return local.toISOString().split('T')[0];
      }

      function formatPhone(value) {
        const numbers = value.replace(/\D/g, '').slice(0, 10);

        if (numbers.length > 6) {
          return numbers.replace(/(\d{3})(\d{3})(\d{0,4})/, '$1-$2-$3');
        }

        if (numbers.length > 3) {
          return numbers.replace(/(\d{3})(\d{0,3})/, '$1-$2');
        }

        return numbers;
      }

      function validateEmails() {
        if (!emailInput || !confirmEmailInput) return;

        if (
          confirmEmailInput.value &&
          emailInput.value.trim() !== confirmEmailInput.value.trim()
        ) {
          confirmEmailInput.setCustomValidity('Emails do not match.');
        } else {
          confirmEmailInput.setCustomValidity('');
        }
      }

      function toggleAirportFields() {
        if (!pickupInput || !airportExtra) return;

        const isAirport = pickupInput.value.trim() === 'Cyril E. King Airport';
        airportExtra.style.display = isAirport ? 'block' : 'none';

        if (!isAirport) {
          const airline = document.getElementById('airline');
          const baggage = document.getElementById('baggage');
          if (airline) airline.value = '';
          if (baggage) baggage.value = '';
        }
      }

      function toggleReturnFields() {
        if (!roundTripSelect || !returnFields) return;

        const isRoundTrip = roundTripSelect.value === 'yes';
        returnFields.style.display = isRoundTrip ? 'block' : 'none';

        if (returnDateInput) {
          returnDateInput.required = isRoundTrip;
        }

        if (returnTime) {
          returnTime.required = isRoundTrip;
        }

        if (!isRoundTrip) {
          if (returnDateInput) returnDateInput.value = '';
          if (returnTime) returnTime.value = '';
        }
      }

      function minutesFromTimeValue(value) {
        if (!value || !value.includes(':')) return null;
        let [hours, minutes] = value.split(':').map(Number);
        if (hours === 0 && minutes === 0) {
          hours = 24;
        }
        return hours * 60 + minutes;
      }

      function disablePastTimes(selectEl, selectedDate, minimumMinutes) {
        if (!selectEl) return;

        const today = getTodayLocalISO();
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        Array.from(selectEl.options).forEach((option) => {
          if (!option.value) {
            option.disabled = false;
            return;
          }

          const optionMinutes = minutesFromTimeValue(option.value);
          let disable = false;

          if (selectedDate === today) {
            disable = optionMinutes <= currentMinutes + 180;
          }

          if (
            minimumMinutes !== null &&
            minimumMinutes !== undefined &&
            optionMinutes !== null &&
            optionMinutes <= minimumMinutes
          ) {
            disable = true;
          }

          option.disabled = disable;
        });

        if (selectEl.selectedOptions.length) {
          const selected = selectEl.selectedOptions[0];
          if (selected && selected.disabled) {
            selectEl.value = '';
          }
        }
      }

      function refreshTimeRules() {
        const outboundDate = dateInput ? dateInput.value : '';
        const returnDate = returnDateInput ? returnDateInput.value : '';
        const outboundMinutes = serviceTime ? minutesFromTimeValue(serviceTime.value) : null;

        if (serviceTime && outboundDate) {
          disablePastTimes(serviceTime, outboundDate, null);
        }

        if (returnTime && returnDate) {
          let minimumMinutes = null;

          if (outboundDate && returnDate && outboundDate === returnDate && outboundMinutes !== null) {
            minimumMinutes = outboundMinutes;
          }

          disablePastTimes(returnTime, returnDate, minimumMinutes);
        }
      }

      function togglePassengerWarning() {
        if (!passengerInput || !passengerWarning) return;
        passengerWarning.style.display =
          Number(passengerInput.value || 0) > 6 ? 'block' : 'none';
      }

      const today = getTodayLocalISO();

      if (dateInput) {
        dateInput.min = today;
      }

      if (returnDateInput) {
        returnDateInput.min = today;
      }

      if (phoneInput) {
        phoneInput.addEventListener('input', function () {
          phoneInput.value = formatPhone(phoneInput.value);
        });
      }

      if (emailInput) {
        emailInput.addEventListener('input', validateEmails);
      }

      if (confirmEmailInput) {
        confirmEmailInput.addEventListener('input', validateEmails);
      }

      if (pickupInput) {
        pickupInput.addEventListener('change', toggleAirportFields);
      }

      if (roundTripSelect) {
        roundTripSelect.addEventListener('change', toggleReturnFields);
      }

      if (dateInput) {
        dateInput.addEventListener('change', function () {
          if (returnDateInput && dateInput.value) {
            returnDateInput.min = dateInput.value;
            if (returnDateInput.value && returnDateInput.value < dateInput.value) {
              returnDateInput.value = '';
            }
          }
          refreshTimeRules();
        });
      }

      if (returnDateInput) {
        returnDateInput.addEventListener('change', refreshTimeRules);
      }

      if (serviceTime) {
        serviceTime.addEventListener('change', refreshTimeRules);
      }

      if (passengerInput) {
        passengerInput.addEventListener('input', togglePassengerWarning);
      }

      if (form) {
        form.addEventListener('submit', function () {
          validateEmails();

          if (!form.checkValidity()) {
            return;
          }

          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
          }
        });
      }

      toggleAirportFields();
      toggleReturnFields();
      togglePassengerWarning();
      refreshTimeRules();
    });
  </script>
</body>
</html>
