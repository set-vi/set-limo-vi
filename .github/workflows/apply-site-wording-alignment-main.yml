name: Apply site wording PR patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-wording:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'amend/site-wording-alignment'
    runs-on: ubuntu-latest
    steps:
      - name: Check out wording branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Check patch state
        id: patch-state
        run: |
          if [ -f .github/workflows/apply-site-wording-alignment.yml ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Wording patch helpers are already removed."
          fi

      - name: Run exact prepared patch
        if: steps.patch-state.outputs.needed == 'true'
        shell: python
        run: |
          from pathlib import Path
          import traceback

          try:
              workflow_path = Path('.github/workflows/apply-site-wording-alignment.yml')
              lines = workflow_path.read_text(encoding='utf-8').splitlines()
              step_marker = '      - name: Apply exact wording amendments'

              try:
                  step_index = lines.index(step_marker)
              except ValueError as exc:
                  raise SystemExit('Prepared wording step was not found') from exc

              run_index = None
              for index in range(step_index + 1, len(lines)):
                  if lines[index].strip() == 'run: |':
                      run_index = index
                      break
              if run_index is None:
                  raise SystemExit('Prepared wording Python block was not found')

              code_lines = []
              for line in lines[run_index + 1:]:
                  if line.startswith('      - name:'):
                      break
                  code_lines.append(line[10:] if line.startswith('          ') else line)

              code = '\n'.join(code_lines).rstrip() + '\n'

              old_button_target = 'booking = replace_once(booking, \'submitButton.textContent = "Submit";\', \'submitButton.textContent = "Submit Reservation Request";\', "booking button reset text")'
              new_button_target = 'booking = replace_once(booking, \'submitButton.textContent = isSubmitting ? "Sending..." : "Submit";\', \'submitButton.textContent = isSubmitting ? "Sending..." : "Submit Reservation Request";\', "booking button reset text")'
              if code.count(old_button_target) != 1:
                  raise SystemExit('Prepared booking button target was not found exactly once')
              code = code.replace(old_button_target, new_button_target, 1)

              old_payment_call = 'booking = re.sub(r\'^[ \\t]*const PAYMENT_TERMS = ".*";$\', aligned_payment_line, booking, count=1, flags=re.MULTILINE)'
              new_payment_call = 'booking_payment_line = aligned_payment_line.rstrip("\\r") + ("\\r" if nl == "\\r\\n" else "")\nbooking, payment_terms_replacements = re.subn(r\'^[ \\t]*const PAYMENT_TERMS = ".*";\\r?$\', booking_payment_line, booking, count=1, flags=re.MULTILINE)'
              if code.count(old_payment_call) != 1:
                  raise SystemExit('Prepared payment terms substitution was not found exactly once')
              code = code.replace(old_payment_call, new_payment_call, 1)

              old_payment_check = 'if booking.count(aligned_payment_line) != 1:'
              new_payment_check = 'if payment_terms_replacements != 1:'
              if code.count(old_payment_check) != 1:
                  raise SystemExit('Prepared payment terms verification was not found exactly once')
              code = code.replace(old_payment_check, new_payment_check, 1)

              if 'homepage hero button' not in code or 'terms animal section' not in code:
                  raise SystemExit('Prepared wording patch failed integrity check')

              exec(compile(code, 'prepared-site-wording-patch.py', 'exec'), {'__name__': '__main__'})
          except BaseException:
              Path('.github/wording-patch-error.txt').write_text(traceback.format_exc(), encoding='utf-8')
              raise

      - name: Record failed check safely
        if: failure() && steps.patch-state.outputs.needed == 'true'
        run: |
          git restore index.html booking.html terms.html thank-you.html flyer/index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/wording-patch-error.txt
          git commit -m "Record wording patch verification error"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Remove branch patch helpers
        if: success()
        run: |
          rm -f .github/apply-site-wording-alignment.trigger
          rm -f .github/workflows/apply-site-wording-alignment.yml
          rm -f .github/wording-patch-error.txt

      - name: Commit verified wording changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html booking.html terms.html thank-you.html flyer/index.html .github
          if git diff --cached --quiet; then
            echo "No additional wording changes to commit."
            exit 0
          fi
          git commit -m "Align customer-facing site wording"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
