name: HTML File Diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    name: Discover HTML files
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.inventory.outputs.files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build HTML inventory
        id: inventory
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          files = [str(path) for path in sorted(Path('.').rglob('*.html'))]
          if not files:
              raise SystemExit('No HTML files found.')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write('files=' + json.dumps(files) + '\n')
          print('\n'.join(files))
          PY

  file_check:
    name: HTML file — ${{ matrix.file }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.discover.outputs.files) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify non-empty UTF-8 file
        shell: bash
        env:
          HTML_FILE: ${{ matrix.file }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ['HTML_FILE'])
          if path.stat().st_size == 0:
              raise SystemExit(f'{path} is empty.')
          path.read_text(encoding='utf-8', errors='strict')
          print(f'{path} is non-empty valid UTF-8.')
          PY
