name: Add child seat policy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-child-seat-policy.yml
      - .github/add-child-seat-policy.trigger

permissions:
  contents: write

jobs:
  add-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply exact policy amendment
        run: |
          python - <<'PY'
          from pathlib import Path

          full_policy = (
              "Superb Executive Transportation does not provide, install, inspect, or secure child safety seats, "
              "booster seats, or other child restraints. The customer is solely responsible for supplying, properly "
              "installing, and properly using any legally required child restraint for each child passenger. Service "
              "may be refused if a legally required restraint is not available or is not properly installed."
          )
          visible_notice = (
              "Child safety seats and booster seats are not provided. Customers must supply and properly install any "
              "required child restraint."
          )

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected 1 match, found {count}")
              return text.replace(old, new, 1)

          terms_path = Path("terms.html")
          terms = terms_path.read_text(encoding="utf-8")
          old_terms = (
              "The customer is responsible for providing and properly using any legally required child restraint, "
              "booster seat, or child safety equipment. Superb Executive Transportation does not provide child safety "
              "seats unless expressly agreed in writing before the reservation is confirmed."
          )
          terms = replace_once(terms, old_terms, full_policy, "terms child-seat clause")
          terms = replace_once(terms, "Last updated: May 2, 2026", "Last updated: July 11, 2026", "terms date")
          terms_path.write_text(terms, encoding="utf-8")

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          minor_sentence = "Riders under 18 must be accompanied by a parent, legal guardian, or responsible adult."
          index = replace_once(index, minor_sentence, minor_sentence + " " + full_policy, "index email policy")
          index_block = '''        <div class="form-row field-card">
          <label for="number-of-passengers">Passengers</label>
          <input type="number" id="number-of-passengers" name="number-of-passengers" min="1" max="6" required />
          <div id="passenger-warning"></div>
        </div>'''
          index_notice = index_block + '\n\n        <div class="form-row full estimate-confirmation">' + visible_notice + '</div>'
          index = replace_once(index, index_block, index_notice, "index passenger notice")
          index_path.write_text(index, encoding="utf-8")

          booking_path = Path("booking.html")
          booking = booking_path.read_text(encoding="utf-8")
          booking_terms = 'const PAYMENT_TERMS = "Payment is required to confirm service. Deposits, booking fees, and reservation payments are non-refundable once service is confirmed, unless Superb Executive Transportation cancels the service or agrees otherwise in writing.";'
          booking_terms_new = 'const PAYMENT_TERMS = "Payment is required to confirm service. Deposits, booking fees, and reservation payments are non-refundable once service is confirmed, unless Superb Executive Transportation cancels the service or agrees otherwise in writing. ' + full_policy + '";'
          booking = replace_once(booking, booking_terms, booking_terms_new, "booking email policy")
          booking_block = '''          <div class="form-row field-card">
            <label for="number-of-passengers">Passengers</label>
            <input type="number" id="number-of-passengers" name="number-of-passengers" min="1" max="6" required />
            <div id="passenger-warning"></div>
          </div>'''
          booking_notice = booking_block + '\n\n          <div class="form-row full estimate-confirmation">' + visible_notice + '</div>'
          booking = replace_once(booking, booking_block, booking_notice, "booking passenger notice")
          booking_path.write_text(booking, encoding="utf-8")

          if "unless expressly agreed in writing before the reservation is confirmed" in terms_path.read_text(encoding="utf-8"):
              raise SystemExit("Old child-seat exception remains")
          PY

      - name: Remove temporary files and commit
        run: |
          rm -f .github/add-child-seat-policy.trigger
          rm -f .github/workflows/add-child-seat-policy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terms.html index.html booking.html .github
          git commit -m "Add child safety seat policy"
          git push origin HEAD:main
