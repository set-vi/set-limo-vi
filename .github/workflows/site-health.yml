name: Site Health

on:
  push:
    branches:
      - website-rebuild
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  site-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run static-site health gate
        run: python tools/site_health.py
