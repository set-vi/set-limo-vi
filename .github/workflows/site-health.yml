name: Site Health

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  site-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run static-site health gate
        run: python tools/site_health.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install browser-test dependency
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run desktop and mobile browser tests
        run: npm run test:browser

      - name: Upload browser test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload rendered visual proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebuild-visual-proof
          path: visual-artifacts
          if-no-files-found: error
          retention-days: 7
