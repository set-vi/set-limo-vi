<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superb Executive Transportation Flyer</title>

  <style>
    body {
      margin: 0;
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      box-sizing: border-box;
    }

    .flyer {
      position: relative;
      width: 100%;
      max-width: 900px;
    }

    .flyer-main {
      display: block;
      width: 100%;
      height: auto;
    }

    .qr-overlay {
      position: absolute;
      left: 50%;
      top: 84%;
      transform: translate(-50%, -50%);
      width: 15%;
      background: #fff;
      padding: 0.8%;
      border: 4px solid #d4a233;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .qr-overlay img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <main class="flyer">
    <img class="flyer-main" src="png/flyer-current.png" alt="Superb Executive Transportation flyer">

    <a class="qr-overlay" href="https://set-vi.github.io/set-limo-vi/booking.html" target="_blank" rel="noopener noreferrer">
      <img src="png/qr-booking-fixed.png" alt="QR code to book Superb Executive Transportation">
    </a>
  </main>
</body>
</html>
