<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superb Executive Transportation Flyer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #000;
      color: #fff;
      font-family: 'Source Sans Pro', sans-serif;
      display: flex;
      justify-content: center;
    }

    .flyer {
      width: 100%;
      max-width: 600px;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(197, 160, 60, 0.28);
      text-align: center;
    }

    .hero {
      background: #000;
    }

    .hero img {
      width: 100%;
      height: 320px;
      object-fit: contain;
      object-position: center center;
      display: block;
      background: #000;
      padding-top: 8px;
    }

    .hero-content {
      padding: 16px 24px 6px;
    }

    .hero h1 {
      margin: 8px 0 8px;
      font-family: 'Playfair Display', serif;
      font-size: 1.68em;
      line-height: 1.15;
      color: #c5a03c;
    }

    .service-line {
      margin: 0;
      font-size: 1.08em;
      font-weight: 600;
      line-height: 1.35;
      color: #fff;
    }

    .location-line {
      margin: 8px 0 0;
      font-size: 1.02em;
      line-height: 1.4;
      color: #fff;
    }

    .vehicle-line {
      margin-top: 14px;
      font-size: 1.02em;
      font-weight: 700;
      line-height: 1.35;
      color: #fff;
    }

    .contact {
      padding: 24px 24px 30px;
    }

    .qr-caption {
      margin: 0 0 14px;
      font-size: 1.18em;
      font-weight: 700;
      color: #fff;
    }

    .qr {
      margin-bottom: 14px;
    }

    .qr img {
      width: 200px;
      border: 2px solid #c5a03c;
      border-radius: 8px;
      background: #fff;
    }

    .contact p {
      margin: 10px 0;
      font-size: 1.06em;
    }

    .contact a {
      text-decoration: none;
    }

    .contact .icon {
      color: #c5a03c;
      margin-right: 6px;
    }

    .contact .label {
      color: #fff;
    }

    @media (max-width: 480px) {
      .hero img {
        height: 260px;
        padding-top: 6px;
      }

      .hero-content {
        padding: 14px 18px 6px;
      }

      .hero h1 {
        font-size: 1.52em;
      }

      .service-line {
        font-size: 0.98em;
      }

      .location-line {
        font-size: 0.95em;
      }

      .vehicle-line {
        font-size: 0.95em;
      }

      .qr-caption {
        font-size: 1.05em;
      }

      .contact p {
        font-size: 1em;
      }

      .qr img {
        width: 170px;
      }
    }
  </style>
</head>
<body>
  <div class="flyer">
    <div class="hero">
      <img src="png/van1.png" alt="Luxury Van" />
      <div class="hero-content">
        <h1>Superb Executive Transportation</h1>
        <p class="service-line">Airport Transfers</p>
        <p class="location-line">Fast, reliable pickup and drop-off — St. Thomas &amp; St. John</p>
        <p class="vehicle-line">Private 6-Passenger Executive Van</p>
      </div>
    </div>

    <div class="contact">
      <div class="qr-caption">Scan or click to start your booking</div>

 <div class="qr">
  <a href="https://set-vi.github.io/set-limo-vi/booking.html" target="_blank" rel="noopener noreferrer">
    <img src="png/qr-booking.png" alt="QR Booking Code" />
</div>

      <p>
        <a href="tel:13406428686">
          <span class="icon">📞</span>
          <span class="label">(340) 642-8686</span>
        </a>
      </p>

      <p>
        <a href="mailto:setlimovi@gmail.com">
          <span class="icon">✉️</span>
          <span class="label">setlimovi@gmail.com</span>
        </a>
      </p>
    </div>
  </div>
</body>
</html>
