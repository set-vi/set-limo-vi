<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superb Executive Transportation Flyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030303;
      --panel: #080808;
      --gold: #cfa24e;
      --gold-soft: #e3c17c;
      --white: #f6f3ee;
      --muted: #d7d1c6;
      --line: rgba(255,255,255,0.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.05), transparent 26%),
        linear-gradient(180deg, #010101 0%, #050505 100%);
      color: var(--white);
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .flyer {
      width: 100%;
      max-width: 760px;
      background: linear-gradient(180deg, #030303 0%, #080808 100%);
      border-radius: 0;
      padding: 28px 26px 34px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.62);
      overflow: hidden;
      position: relative;
    }

    .flyer::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top center, rgba(255,255,255,0.06), transparent 34%);
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 1;
    }

    .full-flyer-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .full-flyer-link {
      display: block;
      width: 100%;
      text-decoration: none;
    }

    .full-flyer-image {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
      margin: 0 auto;
      box-shadow: 0 18px 48px rgba(0,0,0,0.42);
    }

    @media (max-width: 640px) {
      body { padding: 10px; }

      .flyer {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <section class="flyer">
    <div class="inner">
      <div class="full-flyer-wrap">
        <a class="full-flyer-link" href="https://set-vi.github.io/set-limo-vi/booking.html" target="_blank" rel="noopener noreferrer" aria-label="Open Superb Executive Transportation reservation page">
          <img class="full-flyer-image" src="./png/flyer-current.png" alt="Superb Executive Transportation flyer" />
        </a>
      </div>
    </div>
  </section>
</body>
</html>
