<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superb Executive Transportation Flyer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #000;
      color: #fff;
      font-family: 'Source Sans Pro', sans-serif;
      display: flex;
      justify-content: center;
    }

    .flyer {
      width: 100%;
      max-width: 600px;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(197, 160, 60, 0.28);
      text-align: center;
    }

    .hero {
      background: #000;
    }

    .hero img {
      width: 100%;
      height: 320px;
      object-fit: contain;
      object-position: center center;
      display: block;
      background: #000;
      padding-top: 8px;
    }

    .hero-content {
      padding: 16px 24px 6px;
    }

    .hero h1 {
      margin: 8px 0 8px;
      font-family: 'Playfair Display', serif;
      font-size: 1.68em;
      line-height: 1.15;
      color: #c5a03c;
    }

    .service-line {
      margin: 0;
      font-size: 1.08em;
      font-weight: 600;
      line-height: 1.35;
      color: #fff;
    }

    .location-line {
      margin: 8px 0 0;
      font-size: 1.02em;
      line-height: 1.4;
      color: #fff;
    }

    .vehicle-line {
      margin-top: 8px;
      font-size: 1.02em;
      font-weight: 700;
      line-height: 1.35;
      color: #fff;
    }

    .contact {
      padding: 24px 24px 30px;
    }

    .qr-caption {
      margin: 0 0 14px;
      font-size: 1.18em;
      font-weight: 700;
      color: #fff;
    }

    .qr {
      margin-bottom: 14px;
    }

    .qr img {
      width: 200px;
      border: 2px solid #c5a03c;
      border-radius: 8px;
      background: #fff;
      display: inline-block;
    }

    .contact p {
      margin: 10px 0;
      font-size: 1.06em;
    }

    .contact a {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .contact .icon {
      width: 18px;
      height: 18px;
      color: #c5a03c;
      flex-shrink: 0;
    }

    .contact .label {
      color: #fff;
    }

    @media (max-width: 480px) {
      .hero img {
        height: 260px;
        padding-top: 6px;
      }

      .hero-content {
        padding: 14px 18px 6px;
      }

      .hero h1 {
        font-size: 1.52em;
      }

      .service-line {
        font-size: 0.98em;
      }

      .location-line {
        font-size: 0.95em;
      }

      .vehicle-line {
        font-size: 0.95em;
      }

      .qr-caption {
        font-size: 1.05em;
      }

      .contact p {
        font-size: 1em;
      }

      .qr img {
        width: 170px;
      }
    }
  </style>
</head>
<body>
  <div class="flyer">
    <div class="hero">
      <img src="png/van1.png" alt="Luxury Van" />
      <div class="hero-content">
        <h1>Superb Executive Transportation</h1>
        <p class="service-line">Luxury Private Transportation</p>
        <p class="location-line">Serving St. Thomas &amp; St. John</p>
        <p class="vehicle-line">6-Passenger Executive Van</p>
      </div>
    </div>

    <div class="contact">
      <div class="qr-caption">Scan or Click to Start Your Booking</div>

      <div class="qr">
        <a href="https://set-vi.github.io/set-limo-vi/booking.html" target="_blank" rel="noopener noreferrer">
         <img src="https://quickchart.io/qr?text=https%3A%2F%2Fset-vi.github.io%2Fset-limo-vi%2Fbooking.html&size=300&margin=1&ecLevel=H" alt="QR code to book Superb Executive Transportation" />
        </a>
      </div>

      <p>
        <a href="tel:13406428686">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.56 3.58.56a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.3 21 3 13.7 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.19 2.46.56 3.58a1 1 0 0 1-.25 1.01l-2.19 2.2Z"/>
          </svg>
          <span class="label">(340) 642-8686</span>
        </a>
      </p>

      <p>
        <a href="mailto:setlimovi@gmail.com">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 3.24-7.4 5.55a1 1 0 0 1-1.2 0L4 7.24V6l8 6 8-6v1.24Z"/>
          </svg>
          <span class="label">setlimovi@gmail.com</span>
        </a>
      </p>
    </div>
  </div>
</body>
</html>
