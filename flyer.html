@'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superb Executive Transportation Flyer</title>

  <style>
    body {
      margin: 0;
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      box-sizing: border-box;
    }

    .flyer {
      width: 100%;
      max-width: 900px;
    }

    .flyer img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <main class="flyer">
    <img src="png/flyer-current.png" alt="Superb Executive Transportation flyer">
  </main>
</body>
</html>
'@ | Set-Content -Path .\flyer.html -Encoding UTF8
